name: Deploy to IAG5 on merge

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit ref to deploy (defaults to main HEAD)"
        required: false

permissions:
  id-token: write   # OIDC token for AWS
  contents: read

concurrency:
  group: deploy-iag5
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: iag5-shared-lab

    env:
      AWS_REGION:       ${{ vars.AWS_REGION }}
      IAG5_INSTANCE_ID: ${{ vars.IAG5_INSTANCE_ID }}
      DEPLOY_SCRIPT:    ${{ vars.DEPLOY_SCRIPT }}   # e.g. /opt/gateway/deploy.sh
      REPO:             ${{ github.repository }}
      SHA:              ${{ github.sha }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke deploy.sh on IAG5 via SSM
        id: ssm
        run: |
          set -euo pipefail

          # The script on the box receives: repo, sha, and the raw URL of the
          # commit's import.yml. It is responsible for fetching, applying, and
          # exiting non-zero on failure.
          PARAMS=$(jq -nc \
            --arg cmd "sudo -u itential ${DEPLOY_SCRIPT} ${REPO} ${SHA} https://raw.githubusercontent.com/${REPO}/${SHA}/import.yml" \
            '{commands: [$cmd], executionTimeout: ["900"]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${IAG5_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${SHA:0:7} from ${REPO}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters "${PARAMS}" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM command id: ${CMD_ID}"

      - name: Wait for SSM command + report
        run: |
          set -euo pipefail
          CMD_ID="${{ steps.ssm.outputs.command_id }}"

          aws ssm wait command-executed \
            --command-id "${CMD_ID}" \
            --instance-id "${IAG5_INSTANCE_ID}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${IAG5_INSTANCE_ID}" \
            --query 'Status' --output text)

          echo "::group::stdout"
          aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${IAG5_INSTANCE_ID}" \
            --query 'StandardOutputContent' --output text
          echo "::endgroup::"

          echo "::group::stderr"
          aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${IAG5_INSTANCE_ID}" \
            --query 'StandardErrorContent' --output text
          echo "::endgroup::"

          echo "Final status: ${STATUS}"
          [ "${STATUS}" = "Success" ]
