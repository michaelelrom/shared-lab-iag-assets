---
# Single source of truth for what IAG5 should have from this repo.
# Edit, open a PR, merge to main → /opt/gateway/deploy.sh on the IAG5 box
# reconciles state. Drop assets in python-scripts/, ansible-playbooks/, or
# terraform-plans/ and reference them below. See DEPLOY.md for the pipeline.

repositories:
  - name: shared-lab-iag-assets
    description: Assets managed by this repo
    url: https://github.com/michaelelrom/shared-lab-iag-assets.git
    reference: main

decorators:
  - name: junos-netconf-run-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-run-command inputs
      type: object
      properties:
        command:
          description: Operational CLI command to execute (e.g. "show version")
          type: string
      required: [command]
      additionalProperties: false

  - name: junos-netconf-get-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-get-config inputs
      type: object
      properties:
        source:
          description: Datastore to read from (running or candidate)
          type: string
          enum: [running, candidate]
        filter:
          description: Optional XML subtree filter
          type: string
      additionalProperties: false

  - name: junos-netconf-send-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-send-config inputs
      type: object
      properties:
        command:
          description: Junos set-style config command to apply and commit (e.g. "set interfaces ge-0/0/0 description test")
          type: string
      required: [command]
      additionalProperties: false

  - name: send-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: send-config broker inputs
      description: >
        Broker service called by gw-manager's sendConfig path (Config Manager
        remediation). gw-manager passes 'config' (multi-line set commands);
        the script folds it into --command for NETCONF commit.
      type: object
      properties:
        config:
          description: Multi-line Junos set-style config block to apply and commit
          type: string
      additionalProperties: false

  - name: junos-netconf-reboot-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-reboot inputs
      type: object
      properties:
        at:
          description: Junos time spec for reboot (e.g. "+5" for 5 minutes from now)
          type: string
        message:
          description: Optional broadcast message shown to logged-in users before reboot
          type: string
      additionalProperties: false

  - name: itential-set-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: itential_set_config inputs
      description: >
        Inputs for the itential_set_config service called by Config Manager remediation
        via the automation_gateway adapter. Config Manager passes 'config_content'
        (multi-line set commands); the script folds it into --command for NETCONF commit.
      type: object
      properties:
        config_content:
          description: Multi-line Junos set-style config block to apply and commit
          type: string
      additionalProperties: false

  - name: junos-netconf-send-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-send-command inputs
      description: >
        Inputs for junos-netconf-send-command called by the IM iag5-service action handler.
        mergedParameters = action.action_parameters merged with runtimeParameters, so both
        'config' (static action param, may be empty) and 'config_content' (runtime, actual
        config lines) may arrive together. No additionalProperties restriction so extra
        action_parameters pass through without validation errors.
      type: object
      properties:
        config_content:
          description: Config Manager changes extracted as set-style config lines (runtime)
          type: string
        config:
          description: Static config from action_parameters (empty/unused at runtime)
          type: string

  - name: cm-set-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: cm-set-config inputs
      description: >
        Inputs for the set-config service called by Config Manager remediation.
        Config Manager passes a 'changes' array of {parents, old, new} objects;
        the script extracts non-null 'new' values as set-style config lines.
      type: object
      properties:
        changes:
          description: Config Manager changes array — each item has parents, old, new
          type: array
          items:
            type: object
        options:
          description: Config Manager remediation options (e.g. backupDevice)
          type: object
      additionalProperties: false

services:
  - name: test-playbook
    type: ansible-playbook
    description: Smoke-test ansible playbook (localhost debug task)
    repository: shared-lab-iag-assets
    working-directory: ansible-playbooks/test-playbook
    playbooks:
      - site.yml
    tags: [smoke]

  - name: test-script
    type: python-script
    description: Smoke-test python script (prints runtime info)
    repository: shared-lab-iag-assets
    working-directory: python-scripts/test-script
    filename: main.py
    tags: [smoke]

  - name: test-plan
    type: opentofu-plan
    description: Smoke-test OpenTofu plan (no providers, just outputs)
    repository: shared-lab-iag-assets
    working-directory: terraform-plans/test-plan
    tags: [smoke]

  - name: junos-netconf-is-alive
    type: python-script
    description: Junos NETCONF — verify reachability via NETCONF capability exchange
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    runtime:
      env:
        JUNOS_OP: is-alive
    tags: [driver, junos, netconf]

  - name: junos-netconf-run-command
    type: python-script
    description: Junos NETCONF — execute operational CLI commands via <command/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-run-command-input
    runtime:
      env:
        JUNOS_OP: run-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-get-config
    type: python-script
    description: Junos NETCONF — retrieve running or candidate configuration
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-get-config-input
    runtime:
      env:
        JUNOS_OP: get-config
    tags: [driver, junos, netconf]

  - name: junos-netconf-send-config
    type: python-script
    description: Junos NETCONF — apply set-style config with candidate lock and commit
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-send-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-reboot
    type: python-script
    description: Junos NETCONF — schedule reboot via <request-reboot/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-reboot-input
    runtime:
      env:
        JUNOS_OP: reboot
    tags: [driver, junos, netconf]

  - name: send-config
    type: python-script
    description: Junos NETCONF — broker send-config entry point for Config Manager remediation
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: send-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf, broker]

  - name: junos-netconf-send-command
    type: python-script
    description: Junos NETCONF — Config Manager broker remediation via IM iag5-service action (config_content input)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-send-command-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf, broker]

  - name: itential_set_config
    type: python-script
    description: Junos NETCONF — Config Manager remediation via automation_gateway adapter (config_content input, itential_set_config envelope output)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: itential-set-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf, broker]

  - name: set-config
    type: python-script
    description: Junos NETCONF — Config Manager remediation via IM device broker (accepts CM changes array)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: cm-set-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf, broker]
