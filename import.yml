---
# Single source of truth for what IAG5 should have from this repo.
# Edit, open a PR, merge to main → /opt/gateway/deploy.sh on the IAG5 box
# reconciles state. Drop assets in python-scripts/, ansible-playbooks/, or
# terraform-plans/ and reference them below. See DEPLOY.md for the pipeline.

repositories:
  - name: shared-lab-iag-assets
    description: Assets managed by this repo
    url: https://github.com/michaelelrom/shared-lab-iag-assets.git
    reference: main

decorators:
  - name: junos-netconf-run-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-run-command inputs
      type: object
      properties:
        command:
          description: Operational CLI command to execute (e.g. "show version")
          type: string
      required: [command]
      additionalProperties: false

  - name: junos-netconf-get-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-get-config inputs
      type: object
      properties:
        source:
          description: Datastore to read from (running or candidate)
          enum: [running, candidate]
        filter:
          description: Optional XML subtree filter
          type: string
      additionalProperties: false

  - name: junos-netconf-send-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-send-config inputs
      type: object
      properties:
        command:
          description: Junos set-style config command to apply and commit (e.g. "set interfaces ge-0/0/0 description test")
          type: string
      required: [command]
      additionalProperties: false

  - name: junos-netconf-reboot-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-reboot inputs
      type: object
      properties:
        at:
          description: Junos time spec for reboot (e.g. "+5" for 5 minutes from now)
          type: string
        message:
          description: Optional broadcast message shown to logged-in users before reboot
          type: string
      additionalProperties: false

services:
  - name: test-playbook
    type: ansible-playbook
    description: Smoke-test ansible playbook (localhost debug task)
    repository: shared-lab-iag-assets
    working-directory: ansible-playbooks/test-playbook
    playbooks:
      - site.yml
    tags: [smoke]

  - name: test-script
    type: python-script
    description: Smoke-test python script (prints runtime info)
    repository: shared-lab-iag-assets
    working-directory: python-scripts/test-script
    filename: main.py
    tags: [smoke]

  - name: test-plan
    type: opentofu-plan
    description: Smoke-test OpenTofu plan (no providers, just outputs)
    repository: shared-lab-iag-assets
    working-directory: terraform-plans/test-plan
    tags: [smoke]

  - name: junos-netconf-is-alive
    type: python-script
    description: Junos NETCONF — verify reachability via NETCONF capability exchange
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    runtime:
      env:
        JUNOS_OP: is-alive
    tags: [driver, junos, netconf]

  - name: junos-netconf-run-command
    type: python-script
    description: Junos NETCONF — execute operational CLI commands via <command/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-run-command-input
    runtime:
      env:
        JUNOS_OP: run-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-get-config
    type: python-script
    description: Junos NETCONF — retrieve running or candidate configuration
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-get-config-input
    runtime:
      env:
        JUNOS_OP: get-config
    tags: [driver, junos, netconf]

  - name: junos-netconf-send-config
    type: python-script
    description: Junos NETCONF — apply set-style config with candidate lock and commit
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-send-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-reboot
    type: python-script
    description: Junos NETCONF — schedule reboot via <request-reboot/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-reboot-input
    runtime:
      env:
        JUNOS_OP: reboot
    tags: [driver, junos, netconf]
