---
# Single source of truth for what IAG5 should have from this repo.
# Edit, open a PR, merge to main → /opt/gateway/deploy.sh on the IAG5 box
# reconciles state. Drop assets in python-scripts/, ansible-playbooks/, or
# terraform-plans/ and reference them below. See DEPLOY.md for the pipeline.

repositories:
  - name: shared-lab-iag-assets
    description: Assets managed by this repo
    url: https://github.com/michaelelrom/shared-lab-iag-assets.git
    reference: main

decorators:
  - name: junos-netconf-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf input
      description: >
        Connection parameters (host, port, user, password, timeout, lock-*)
        are read by the script from stdin (gateway5 InventoryInfo). Only the
        action selector and per-action runtime inputs (command, source, etc.)
        are passed via --set / action_parameters.
      type: object
      properties:
        action:
          description: Operation to perform
          enum: [is-alive, run-command, get-config, send-command, reboot]
        command:
          description: Operational or set-style command (required for run-command and send-command)
          type: string
        source:
          description: Datastore source for get-config
          enum: [running, candidate]
          default: running
        filter:
          description: XML subtree filter for get-config
          type: string
        at:
          description: Junos time spec for reboot (e.g. "+5" for 5 minutes)
          type: string
        message:
          description: Optional broadcast message for reboot
          type: string
        host:
          description: Override the inventory itential_host (rarely needed)
          type: string
        port:
          description: Override the inventory netconf port
          type: integer
          minimum: 1
          maximum: 65535
        user:
          description: Override the inventory itential_user
          type: string
        password:
          description: Override the inventory itential_password
          type: string
        timeout:
          description: Override the netconf session timeout in seconds
          type: integer
          minimum: 1
        lock-timeout:
          description: Override candidate-lock wait for send-command (0 = no wait)
          type: integer
          minimum: 0
        lock-poll-interval:
          description: Override candidate-lock retry interval
          type: number
          minimum: 0.1
      required: [action]
      additionalProperties: false

services:
  - name: test-playbook
    type: ansible-playbook
    description: Smoke-test ansible playbook (localhost debug task)
    repository: shared-lab-iag-assets
    working-directory: ansible-playbooks/test-playbook
    playbooks:
      - site.yml
    tags: [smoke]

  - name: test-script
    type: python-script
    description: Smoke-test python script (prints runtime info)
    repository: shared-lab-iag-assets
    working-directory: python-scripts/test-script
    filename: main.py
    tags: [smoke]

  - name: test-plan
    type: opentofu-plan
    description: Smoke-test OpenTofu plan (no providers, just outputs)
    repository: shared-lab-iag-assets
    working-directory: terraform-plans/test-plan
    tags: [smoke]

  - name: junos-netconf
    type: python-script
    description: Junos NETCONF driver (is-alive, run-command, get-config, send-command, reboot)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-input
    tags: [driver, junos, netconf]
