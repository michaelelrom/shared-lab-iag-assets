---
# Single source of truth for what IAG5 should have from this repo.
# Edit, open a PR, merge to main → /opt/gateway/deploy.sh on the IAG5 box
# reconciles state. Drop assets in python-scripts/, ansible-playbooks/, or
# terraform-plans/ and reference them below. See DEPLOY.md for the pipeline.

repositories:
  - name: shared-lab-iag-assets
    description: Assets managed by this repo
    url: https://github.com/michaelelrom/shared-lab-iag-assets.git
    reference: main

decorators:
  - name: junos-netconf-run-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-run-command inputs
      type: object
      properties:
        command:
          description: Operational CLI command to execute (e.g. "show version")
          type: string
      required: [command]
      additionalProperties: false

  - name: junos-netconf-get-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-get-config inputs
      type: object
      properties:
        source:
          description: Datastore to read from (running or candidate)
          type: string
          enum: [running, candidate]
        filter:
          description: Optional XML subtree filter
          type: string
      additionalProperties: false

  - name: junos-netconf-send-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-send-config inputs
      type: object
      properties:
        config:
          description: Multi-line Junos set-style config block to apply and commit
          type: string
        lock_timeout:
          description: Seconds to wait for the candidate datastore lock before failing (0 = fail immediately)
          type: integer
          default: 30
        dry_run:
          description: Validate config against the candidate datastore without committing (true = validate only)
          type: string
          enum: ["true", "false"]
          default: "false"
        confirmed:
          description: Use a confirmed commit — device auto-rolls back unless a second commit arrives within confirm_timeout minutes
          type: string
          enum: ["true", "false"]
          default: "false"
        confirm_timeout:
          description: Minutes before auto-rollback for a confirmed commit (only used when confirmed is true)
          type: integer
          default: 10
      additionalProperties: false

  - name: junos-netconf-reboot-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-reboot inputs
      type: object
      properties:
        at:
          description: Junos time spec for reboot (e.g. "+5" for 5 minutes from now)
          type: string
        message:
          description: Optional broadcast message shown to logged-in users before reboot
          type: string
      additionalProperties: false

  - name: junos-netconf-set-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-set-config inputs
      type: object
      properties:
        config:
          description: JSON-encoded Config Manager changes array [{parents, old, new}]
          type: string
      required: [config]
      additionalProperties: false

  - name: junos-netconf-send-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: junos-netconf-send-command inputs
      type: object
      properties:
        commands:
          description: Array of Junos set-style config commands to apply and commit
          type: array
          items:
            type: string
        lock_timeout:
          description: Seconds to wait for the candidate datastore lock before failing (0 = fail immediately)
          type: integer
          default: 30
        dry_run:
          description: Validate config against the candidate datastore without committing (true = validate only)
          type: string
          enum: ["true", "false"]
          default: "false"
        confirmed:
          description: Use a confirmed commit — device auto-rolls back unless a second commit arrives within confirm_timeout minutes
          type: string
          enum: ["true", "false"]
          default: "false"
        confirm_timeout:
          description: Minutes before auto-rollback for a confirmed commit (only used when confirmed is true)
          type: integer
          default: 10
      required: [commands]
      additionalProperties: false

  - name: netsdk-thycotic-run-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: netsdk-thycotic-run-command inputs
      type: object
      properties:
        command:
          description: Operational CLI command to execute (e.g. "show version")
          type: string
      required: [command]
      additionalProperties: false

  - name: netsdk-thycotic-get-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: netsdk-thycotic-get-config inputs
      type: object
      properties:
        source:
          description: Configuration source (running or startup)
          type: string
          enum: [running, startup]
      additionalProperties: false

  - name: netsdk-thycotic-send-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: netsdk-thycotic-send-command inputs
      type: object
      properties:
        commands:
          description: Array of CLI config commands to apply (e.g. "interface GigabitEthernet1")
          type: array
          items:
            type: string
      required: [commands]
      additionalProperties: false

  - name: netsdk-thycotic-send-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: netsdk-thycotic-send-config inputs
      type: object
      properties:
        config:
          description: Multi-line CLI config block to apply and save
          type: string
      required: [config]
      additionalProperties: false

  - name: netsdk-thycotic-set-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: netsdk-thycotic-set-config inputs
      type: object
      properties:
        config:
          description: JSON-encoded Config Manager changes array [{parents, old, new}]
          type: string
      required: [config]
      additionalProperties: false

  - name: f5-rest-run-command-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: f5-rest-run-command inputs
      type: object
      properties:
        command:
          description: Bash or TMSH command to execute (e.g. "tmsh show sys version")
          type: string
      required: [command]
      additionalProperties: false

  - name: f5-rest-rest-call-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: f5-rest-rest-call inputs
      type: object
      properties:
        verb:
          description: HTTP method
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        route:
          description: iControl REST route (e.g. /mgmt/tm/ltm/virtual)
          type: string
        body:
          description: JSON request body (optional)
          type: string
      required: [verb, route]
      additionalProperties: false

  - name: f5-rest-set-config-input
    schema:
      $schema: https://json-schema.org/draft/2020-12/schema
      title: f5-rest-set-config inputs
      type: object
      properties:
        config:
          description: JSON-encoded Config Manager changes array [{parents, old, new}]
          type: string
      required: [config]
      additionalProperties: false

services:
  - name: test-playbook
    type: ansible-playbook
    description: Smoke-test ansible playbook (localhost debug task)
    repository: shared-lab-iag-assets
    working-directory: ansible-playbooks/test-playbook
    playbooks:
      - site.yml
    tags: [smoke]

  - name: test-script
    type: python-script
    description: Smoke-test python script (prints runtime info)
    repository: shared-lab-iag-assets
    working-directory: python-scripts/test-script
    filename: main.py
    tags: [smoke]

  - name: test-plan
    type: opentofu-plan
    description: Smoke-test OpenTofu plan (no providers, just outputs)
    repository: shared-lab-iag-assets
    working-directory: terraform-plans/test-plan
    tags: [smoke]

  - name: junos-netconf-is-alive
    type: python-script
    description: Junos NETCONF — verify reachability via NETCONF capability exchange
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    runtime:
      env:
        JUNOS_OP: is-alive
    tags: [driver, junos, netconf]

  - name: junos-netconf-run-command
    type: python-script
    description: Junos NETCONF — execute operational CLI commands via <command/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-run-command-input
    runtime:
      env:
        JUNOS_OP: run-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-get-config
    type: python-script
    description: Junos NETCONF — retrieve running or candidate configuration
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-get-config-input
    runtime:
      env:
        JUNOS_OP: get-config
    tags: [driver, junos, netconf]

  - name: junos-netconf-send-config
    type: python-script
    description: Junos NETCONF — apply multi-line set-style config block with candidate lock and commit (workflow task)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-send-config-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-send-command
    type: python-script
    description: Junos NETCONF — apply an array of set-style config commands with candidate lock and commit (workflow task)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-send-command-input
    runtime:
      env:
        JUNOS_OP: send-command
    tags: [driver, junos, netconf]

  - name: junos-netconf-reboot
    type: python-script
    description: Junos NETCONF — schedule reboot via <request-reboot/> RPC
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-reboot-input
    runtime:
      env:
        JUNOS_OP: reboot
    tags: [driver, junos, netconf]

  - name: junos-netconf-set-config
    type: python-script
    description: Junos NETCONF — Config Manager remediation via IM iag5-service action (broker entry point)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/junos
    filename: main.py
    decorator: junos-netconf-set-config-input
    runtime:
      env:
        JUNOS_OP: set-config
    tags: [driver, junos, netconf, broker]

  - name: netsdk-thycotic-is-alive
    type: python-script
    description: netsdk-thycotic — verify device reachability via netmiko; password resolved from Thycotic
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    runtime:
      env:
        NETSDK_OP: is-alive
    tags: [driver, netsdk, thycotic]

  - name: netsdk-thycotic-run-command
    type: python-script
    description: netsdk-thycotic — execute operational CLI command via netmiko; password resolved from Thycotic
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    decorator: netsdk-thycotic-run-command-input
    runtime:
      env:
        NETSDK_OP: run-command
    tags: [driver, netsdk, thycotic]

  - name: netsdk-thycotic-get-config
    type: python-script
    description: netsdk-thycotic — retrieve running configuration via netmiko; password resolved from Thycotic
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    decorator: netsdk-thycotic-get-config-input
    runtime:
      env:
        NETSDK_OP: get-config
    tags: [driver, netsdk, thycotic]

  - name: netsdk-thycotic-send-command
    type: python-script
    description: netsdk-thycotic — apply array of CLI config commands via netmiko (workflow task)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    decorator: netsdk-thycotic-send-command-input
    runtime:
      env:
        NETSDK_OP: send-command
    tags: [driver, netsdk, thycotic]

  - name: netsdk-thycotic-send-config
    type: python-script
    description: netsdk-thycotic — apply multi-line CLI config block via netmiko (workflow task)
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    decorator: netsdk-thycotic-send-config-input
    runtime:
      env:
        NETSDK_OP: send-config
    tags: [driver, netsdk, thycotic]

  - name: netsdk-thycotic-set-config
    type: python-script
    description: netsdk-thycotic — Config Manager remediation broker entry point; password resolved from Thycotic
    repository: shared-lab-iag-assets
    working-directory: device-drivers/netsdk-thycotic
    filename: main.py
    decorator: netsdk-thycotic-set-config-input
    runtime:
      env:
        NETSDK_OP: set-config
    tags: [driver, netsdk, thycotic, broker]

  - name: f5-rest-is-alive
    type: python-script
    description: F5 BIG-IP iControl REST — verify reachability via GET /mgmt/tm/sys/version
    repository: shared-lab-iag-assets
    working-directory: device-drivers/f5-rest
    filename: main.py
    runtime:
      env:
        F5_REST_OP: is-alive
    tags: [driver, f5, rest]

  - name: f5-rest-run-command
    type: python-script
    description: F5 BIG-IP iControl REST — execute bash or TMSH command via /mgmt/tm/util/bash
    repository: shared-lab-iag-assets
    working-directory: device-drivers/f5-rest
    filename: main.py
    decorator: f5-rest-run-command-input
    runtime:
      env:
        F5_REST_OP: run-command
    tags: [driver, f5, rest]

  - name: f5-rest-get-config
    type: python-script
    description: F5 BIG-IP iControl REST — retrieve configuration via configurable TMSH command
    repository: shared-lab-iag-assets
    working-directory: device-drivers/f5-rest
    filename: main.py
    runtime:
      env:
        F5_REST_OP: get-config
    tags: [driver, f5, rest]

  - name: f5-rest-rest-call
    type: python-script
    description: F5 BIG-IP iControl REST — generic passthrough; caller supplies verb, route, and body
    repository: shared-lab-iag-assets
    working-directory: device-drivers/f5-rest
    filename: main.py
    decorator: f5-rest-rest-call-input
    runtime:
      env:
        F5_REST_OP: rest-call
    tags: [driver, f5, rest]

  - name: f5-rest-set-config
    type: python-script
    description: F5 BIG-IP iControl REST — Config Manager remediation broker entry point
    repository: shared-lab-iag-assets
    working-directory: device-drivers/f5-rest
    filename: main.py
    decorator: f5-rest-set-config-input
    runtime:
      env:
        F5_REST_OP: set-config
    tags: [driver, f5, rest, broker]

